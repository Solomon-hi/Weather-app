<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      padding: 20px;
      color: white;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2rem;
    }

    .subtitle {
      text-align: center;
      opacity: 0.8;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background: #0096c7;
      transform: translateY(-2px);
    }

    .weather-info {
      margin-top: 20px;
      text-align: center;
    }

    .city {
      font-size: 1.6rem;
      font-weight: bold;
    }

    .temp {
      font-size: 3rem;
      margin: 15px 0;
    }

    .details {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      gap: 10px;
    }

    .detail-card {
      flex: 1;
      background: rgba(255,255,255,0.12);
      padding: 15px;
      border-radius: 14px;
    }

    .loading {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      opacity: 0.8;
    }

    @media (max-width: 500px) {
      .search-box {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .details {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    <h1>🌤 Weather App</h1>

    <p class="subtitle">
      Real-time weather using Open-Meteo API
    </p>

    <div class="search-box">
      <input id="city" placeholder="Enter city name..." />
      <button id="get">Search</button>
    </div>

    <div id="loading" class="loading"></div>

    <div id="weather" class="weather-info"></div>
  </div>

  <script>
    const weather = document.getElementById("weather");
    const loading = document.getElementById("loading");

    async function getCoordinates(city) {
      const res = await fetch(
        "https://geocoding-api.open-meteo.com/v1/search?name=" +
        encodeURIComponent(city)
      );

      const data = await res.json();

      return data.results && data.results[0];
    }

    document.getElementById("get").onclick = async () => {

      const city = document.getElementById("city").value.trim();

      if (!city) {
        alert("Please enter a city");
        return;
      }

      loading.textContent = "Loading weather...";
      weather.innerHTML = "";

      try {

        const location = await getCoordinates(city);

        if (!location) {
          loading.textContent = "";
          weather.innerHTML = "<p>City not found.</p>";
          return;
        }

        const response = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${location.latitude}&longitude=${location.longitude}&current_weather=true`
        );

        const data = await response.json();

        loading.textContent = "";

        weather.innerHTML = `
          <div class="city">
            ${location.name}, ${location.country}
          </div>

          <div class="temp">
            ${data.current_weather.temperature}°C
          </div>

          <div class="details">

            <div class="detail-card">
              <h3>💨 Wind</h3>
              <p>${data.current_weather.windspeed} km/h</p>
            </div>

            <div class="detail-card">
              <h3>🧭 Direction</h3>
              <p>${data.current_weather.winddirection}°</p>
            </div>

          </div>
        `;

      } catch (error) {

        loading.textContent = "";
        weather.innerHTML = `
          <p>Something went wrong.</p>
        `;

      }
    };
  </script>

</body>
</html>
